# Stack Ventas360 en Docker (API + web + Postgres).
# Desde este repo:
#   docker compose up --build -d
#
# URLs:
#   Front  http://localhost:4201
#   API    http://localhost:8001/docs
#   DB     localhost:5433
#
# Login demo: admin@ventas360.com / demo12345

services:
  api:
    build: .
    image: ventas360-api:latest
    ports:
      - "8001:8000"
    environment:
      VENTAS360_ENTORNO: dev
      VENTAS360_DATABASE_URL: postgresql+asyncpg://ventas360:ventas360@db:5432/ventas360
      VENTAS360_JWT_SECRETO: secreto-solo-para-desarrollo
      VENTAS360_CORS_ORIGINS: http://localhost:4201,http://127.0.0.1:4201
      VENTAS360_SEED_AL_INICIAR: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../ventas360-web
      dockerfile: Dockerfile
    image: ventas360-web:latest
    ports:
      - "4201:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ventas360
      POSTGRES_PASSWORD: ventas360
      POSTGRES_DB: ventas360
    ports:
      - "5433:5432"
    volumes:
      - ventas360-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ventas360 -d ventas360"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  ventas360-pgdata:
